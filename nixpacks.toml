# nixpacks.toml
# This file provides system-level packages required by Playwright/Chromium 
# without needing sudo/root access during the build.

[phases.setup]
aptPackages = [
    "libnss3",
    "libnspr4",
    "libatk1.0-0",
    "libatk-bridge2.0-0",
    "libcups2",
    "libdrm2",
    "libxkbcommon0",
    "libxcomposite1",
    "libxdamage1",
    "libxfixes3",
    "libxrandr2",
    "libgbm1",
    "libasound2",
    "libpango-1.0-0",
    "libpangocairo-1.0-0",
    "libxshmfence1",
    "libxcursor1",
    "libxi6",
    "libxrender1",
    "libx11-xcb1",
    "libx11-6",
    "libxcb1",
    "libxss1",
    "libxtst6",
    "libgtk-3-0"
]
